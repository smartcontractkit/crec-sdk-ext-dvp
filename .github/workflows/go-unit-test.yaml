name: Go Unit Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci-test-go:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: ci-test-go
        uses: smartcontractkit/.github/actions/ci-test-go@ci-test-go/1.3.0
        with:
          use-gati: false
          go-test-cmd: go test ./...
          use-go-cache: true
